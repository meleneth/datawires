services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/datawires:cached
      - bundle-data:/usr/local/bundle
      - codex-home:/home/vscode/.codex
    environment:
      DATABASE_HOST: db
      DATABASE_USERNAME: datawires
      DATABASE_PASSWORD: datawires
      RAILS_ENV: development
      BUNDLE_PATH: /usr/local/bundle
      CODEX_HOME: /home/vscode/.codex
    depends_on:
      - db
    command: sh .devcontainer/start-dev-server.sh
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    ports:
      - "3000:3000"

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: datawires_development
      POSTGRES_USER: datawires
      POSTGRES_PASSWORD: datawires
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  bundle-data:
  postgres-data:
  codex-home:
